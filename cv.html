      <section id="cv">
         <div class="section-header">
            <span class="section-eyebrow-light">Professional Profile</span>
            <h2 class="section-title-light">Curriculum Vitae</h2>
         </div>

         <div class="cv-tabs">
            <button class="cvtab active" onclick="switchCV('maritime', this)">
               Maritime
            </button>
            <button class="cvtab" onclick="switchCV('onshore', this)">
               Onshore 
            </button>
         </div>

         <div class="cv-panel active" id="cv-maritime">
            <div class="cv-gallery">
               <div class="main-cv">
                  <img
                     src="images/cv/maritime-cv.png"
                     alt="Maritime CV"
                     onclick="openLightbox(this.src)"
                  />
                  <a
                     href="assets/Dian_Loucas_Maritime_CV.pdf"
                     download
                     class="cv-download"
                  >
                     Download CV (PDF)
                  </a>
               </div>
               <div class="cert-grid">
                  <img
                     src="images/cv/certs/compcrew.png"
                     alt="Competent Crew"
                     onclick="openLightbox(this.src)"
                  />
                  <img
                     src="images/cv/certs/efa.png"
                     alt="Elementary Firs Aid"
                     onclick="openLightbox(this.src)"
                  />
                  <img
                     src="images/cv/certs/mff.png"
                     alt="Fire Fighting & Fire Prevention"
                     onclick="openLightbox(this.src)"
                  />
                  <img
                     src="images/cv/certs/pdsd.png"
                     alt="Designated Security Duties"
                     onclick="openLightbox(this.src)"
                  />
                  <img
                     src="images/cv/certs/prvh.png"
                     alt="Prevention and Response to Violence and Harassment"
                     onclick="openLightbox(this.src)"
                  />
                  <img
                     src="images/cv/certs/pssr.png"
                     alt="Personal Safety and Social Responsibilities"
                     onclick="openLightbox(this.src)"
                  />
                  <img
                     src="images/cv/certs/pst.png"
                     alt="Personal Survival Techniques"
                     onclick="openLightbox(this.src)"
                  />
                  <img
                     src="images/cv/certs/pwc-pb2.png"
                     alt="Personal Watercraft & Powerboat2 Liscence"
                     onclick="openLightbox(this.src)"
                  />
                  <img
                     src="images/cv/certs/superdeck.png"
                     alt="Super Deckhand Course"
                     onclick="openLightbox(this.src)"
                  />
               </div>
            </div>
         </div>

         <div class="cv-panel" id="cv-onshore">
            <div class="cv-gallery">
               <div class="main-cv">
                  <img
                     src="images/cv/landbased.png"
                     alt="Onshore CV"
                     onclick="openLightbox(this.src)"
                  />
                  <a
                     href="assets/Dian_Loucas_Hospitality_CV.pdf"
                     download
                     class="cv-download"
                  >
                     Download CV (PDF)
                  </a>
               </div>
            </div>
         </div>
      </section>
