   <body>

      <section id="cv">
         <div class="section-header">
            <span class="section-eyebrow-light">Professional Profile</span>
            <h2 class="section-title-light">Curriculum Vitae</h2>
         </div>

         <div class="cv-tabs">
            <button class="cvtab active" onclick="switchCV('maritime', this)">
               Maritime
            </button>
            <button class="cvtab" onclick="switchCV('onshore', this)">
               Onshore / Hospitality
            </button>
         </div>

         <div class="cv-panel active" id="cv-maritime">
            <div class="cv-gallery">
               <div class="main-cv">
                  <img
                     src="images/cv/Maritime_CV-1.jpg"
                     alt="Maritime CV"
                     onclick="openLightbox(this.src)"
                  />
                  <a
                     href="assets/Dian_Loucas_Maritime_CV.pdf"
                     download
                     class="cv-download"
                  >
                     Download CV (PDF)
                  </a>
               </div>
               <div class="cert-grid">
                  <img
                     src="images/cv/certs/stcw.jpg"
                     alt="STCW"
                     onclick="openLightbox(this.src)"
                  />
                  <img
                     src="images/cv/certs/eng1.jpg"
                     alt="ENG1 Medical"
                     onclick="openLightbox(this.src)"
                  />
                  <img
                     src="images/cv/certs/pwc.jpg"
                     alt="PWC License"
                     onclick="openLightbox(this.src)"
                  />
                  <img
                     src="images/cv/certs/pb2.jpg"
                     alt="Powerboat Level 2"
                     onclick="openLightbox(this.src)"
                  />
                  <img
                     src="images/cv/certs/src.jpg"
                     alt="SRC Radio License"
                     onclick="openLightbox(this.src)"
                  />
               </div>
            </div>
         </div>

         <div class="cv-panel" id="cv-onshore">
            <div class="cv-gallery">
               <div class="main-cv">
                  <img
                     src="images/cv/Onshore_CV-1.jpg"
                     alt="Onshore CV"
                     onclick="openLightbox(this.src)"
                  />
                  <a
                     href="assets/Dian_Loucas_Hospitality_CV.pdf"
                     download
                     class="cv-download"
                  >
                     Download CV (PDF)
                  </a>
               </div>
            </div>
         </div>
      </section>

      <footer>
         <span class="footer-name">DIAN LOUCAS</span>
         <span class="footer-copy">© 2026 · All rights reserved</span>
      </footer>

      <div class="lightbox" id="lightbox">
         <span class="close-lightbox lightbox-close">&times;</span>
         <img id="lightbox-image" src="" alt="" />
      </div>

      <script>
         function switchCV(type, el) {
            const isAlreadyActive = el.classList.contains("active");
            if (isAlreadyActive) return;

            document
               .querySelectorAll(".cvtab")
               .forEach((t) => t.classList.remove("active"));
            document
               .querySelectorAll(".cv-panel")
               .forEach((p) => p.classList.remove("active"));

            el.classList.add("active");
            document.getElementById("cv-" + type).classList.add("active");
         }

         // Corrected class assignment to map seamlessly to styles.css configurations
         function openLightbox(src) {
            const lb = document.getElementById("lightbox");
            const lbImg = document.getElementById("lightbox-image");
            if (!lb || !lbImg) return;
            
            lbImg.src = src;
            lb.classList.add("show");
         }

         document.addEventListener("DOMContentLoaded", () => {
            const lb = document.getElementById("lightbox");
            const closeBtn = document.querySelector(".close-lightbox");

            if (lb) {
               lb.addEventListener("click", function (e) {
                  if (e.target === lb) lb.classList.remove("show");
               });

               if (closeBtn) {
                  closeBtn.addEventListener("click", function () {
                     lb.classList.remove("show");
                  });
               }

               document.addEventListener("keydown", function (e) {
                  if (e.key === "Escape") lb.classList.remove("show");
               });
            }
         });
      </script>
   </body>
</html>
